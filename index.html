<html lang="en">
<head>
<meta charset="UTF-8">

<title>Wordbench — Sentence Puzzles &amp; Reading Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20263B;
    --ink-soft:#3B4260;
    --paper:#F5EFE0;
    --paper-alt:#ECE3CB;
    --card:#FFFDF6;
    --teal:#2F6F62;
    --teal-deep:#1F4D43;
    --mustard:#D9A62E;
    --rose:#B94A48;
    --line:#D8CDAE;
    --radius:14px;
    --shadow:0 6px 18px rgba(32,38,59,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  a{color:inherit;}

  /* ---------- Top bar ---------- */
  header.top{
    background:var(--ink);
    color:var(--paper);
    padding:22px 24px 0 24px;
  }
  .top-inner{max-width:960px;margin:0 auto;}
  .brand{
    display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  }
  .brand h1{font-size:1.7rem;margin:0;color:#fff;}
  .brand .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--mustard);
    background:rgba(217,166,46,0.14);
    padding:3px 8px;
    border-radius:20px;
  }
  .brand p{margin:6px 0 18px 0;color:#C9CEE0;font-size:0.95rem;max-width:56ch;}

  nav.tabs{display:flex;gap:2px;}
  nav.tabs button{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.85rem;
    letter-spacing:0.02em;
    background:transparent;
    border:none;
    color:#9BA1C2;
    padding:12px 18px;
    cursor:pointer;
    border-radius:10px 10px 0 0;
    position:relative;
    top:1px;
  }
  nav.tabs button.active{
    background:var(--paper);
    color:var(--ink);
    font-weight:600;
  }
  nav.tabs button:not(.active):hover{color:#fff;}

  main{max-width:960px;margin:0 auto;padding:28px 24px 70px 24px;}
  section.panel{display:none;}
  section.panel.active{display:block;}

  /* ---------- Level picker ---------- */
  .level-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
  .level-stamp{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:0.85rem;
    border:2px solid var(--ink);
    background:var(--card);
    color:var(--ink);
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    transform:rotate(-1deg);
    transition:transform .12s ease, background .12s ease, color .12s ease;
  }
  .level-stamp:nth-child(even){transform:rotate(1deg);}
  .level-stamp:hover{transform:rotate(0deg) scale(1.04);}
  .level-stamp.active{
    background:var(--teal);
    border-color:var(--teal-deep);
    color:#fff;
    transform:rotate(0deg) scale(1.06);
  }

  /* ---------- Game card ---------- */
  .game-card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:28px;
    border:1px solid var(--line);
  }
  .game-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .stat{font-family:'IBM Plex Mono',monospace;font-size:0.85rem;color:var(--ink-soft);}
  .stat b{color:var(--teal-deep);}

  .answer-line{
    min-height:64px;
    border-bottom:3px solid var(--ink);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px;
    padding:8px 4px 14px 4px;
    margin-bottom:22px;
  }
  .answer-line:empty::before{
    content:"Tap the words below in order to build the sentence.";
    color:#9A9784;
    font-style:italic;
    font-size:0.95rem;
  }
  .tray{
    display:flex;flex-wrap:wrap;gap:10px;
    padding:16px;
    background:var(--paper-alt);
    border-radius:10px;
    min-height:70px;
  }
  .tile{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:1rem;
    background:#fff;
    border:1.5px solid var(--ink);
    border-radius:7px;
    padding:9px 14px;
    cursor:pointer;
    box-shadow:2px 2px 0 var(--ink);
    transition:transform .08s ease;
    user-select:none;
  }
  .tile:hover{transform:translateY(-2px);}
  .tile:active{transform:translateY(0);box-shadow:1px 1px 0 var(--ink);}
  .tile.placed{
    background:var(--teal);
    color:#fff;
    border-color:var(--teal-deep);
    box-shadow:2px 2px 0 var(--teal-deep);
  }

  .game-actions{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}
  button.btn{
    font-family:'Work Sans',sans-serif;
    font-weight:600;
    font-size:0.92rem;
    padding:11px 20px;
    border-radius:9px;
    border:2px solid var(--ink);
    background:var(--ink);
    color:#fff;
    cursor:pointer;
  }
  button.btn.secondary{background:transparent;color:var(--ink);}
  button.btn.ghost{border-color:var(--line);color:var(--ink-soft);}
  button.btn:disabled{opacity:0.45;cursor:not-allowed;}

  .hint-line{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.82rem;
    color:var(--teal-deep);
    background:rgba(47,111,98,0.08);
    border-left:3px solid var(--teal);
    padding:8px 12px;
    border-radius:0 6px 6px 0;
    margin-bottom:18px;
    min-height:1.2em;
  }
  .hint-line:empty{display:none;}

  .feedback{
    margin-top:16px;
    font-weight:600;
    font-size:0.98rem;
    min-height:1.4em;
  }
  .feedback.correct{color:var(--teal-deep);}
  .feedback.wrong{color:var(--rose);}

  /* ---------- Reading library ---------- */
  .lib-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px 22px;
    margin-bottom:16px;
    cursor:pointer;
  }
  .lib-card .lib-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .lib-card h3{margin:0 0 6px 0;font-size:1.15rem;}
  .lib-meta{font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--ink-soft);}
  .lib-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;font-weight:600;
    background:var(--mustard);
    color:var(--ink);
    padding:3px 9px;border-radius:20px;
    white-space:nowrap;
  }
  .lib-preview{color:var(--ink-soft);font-size:0.92rem;margin-top:8px;line-height:1.5;}
  .lib-full{display:none;margin-top:14px;border-top:1px dashed var(--line);padding-top:14px;line-height:1.7;font-size:1rem;}
  .lib-card.open .lib-full{display:block;}
  .lib-card.open .lib-preview{display:none;}
  .lib-questions{margin-top:16px;background:var(--paper-alt);border-radius:8px;padding:14px 16px;}
  .lib-questions p{margin:0 0 6px 0;font-weight:600;font-size:0.9rem;}
  .lib-questions ol{margin:0;padding-left:20px;font-size:0.92rem;}
  .lib-questions li{margin-bottom:4px;}

  footer{
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.75rem;
    color:var(--ink-soft);
    padding:30px 24px 40px 24px;
  }

  @media (max-width:600px){
    .brand h1{font-size:1.4rem;}
    .game-card{padding:20px;}
  }
</style>
</head>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <h1>Wordbench</h1>
      <span class="tag">A1 → C2</span>

    <p>Put scrambled sentences back in order, then browse short reading passages leveled just for you.</p>

    </nav>
  </div>
</header>

<main>

  <!-- ================= GAME PANEL ================= -->

      </div>

      <div class="answer-line" id="answerLine"></div>
      <div class="hint-line" id="hintLine"></div>
      <div class="tray" id="tray"></div>

      <div class="game-actions">
        <button class="btn" id="checkBtn">Check answer</button>
        <button class="btn secondary" id="clearBtn">Clear</button>
        <button class="btn ghost" id="hintBtn">Hint</button>
        <button class="btn ghost" id="nextBtn">Skip →</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </section>

  <!-- ================= LIBRARY PANEL ================= -->
  <section id="libPanel" class="panel">
    <div class="level-row" id="libLevels"></div>
    <div id="libList"></div>
  </section>

</main>

/* =========================================================================
   APP LOGIC — no need to edit below this line.
   ========================================================================= */

const LEVELS = ["A1","A2","B1","B2","C1","C2"];

// ---- Tabs ----
const tabGameBtn = document.getElementById('tabGameBtn');
const tabLibBtn = document.getElementById('tabLibBtn');
const gamePanel = document.getElementById('gamePanel');
const libPanel = document.getElementById('libPanel');

tabGameBtn.onclick = () => switchTab('game');
tabLibBtn.onclick = () => switchTab('lib');
function switchTab(which){
  const gameActive = which === 'game';
  tabGameBtn.classList.toggle('active', gameActive);
  tabLibBtn.classList.toggle('active', !gameActive);
  gamePanel.classList.toggle('active', gameActive);
  libPanel.classList.toggle('active', !gameActive);
}

// ---- Level pickers ----
function buildLevelRow(container, currentLevel, onSelect){
  container.innerHTML = '';
  LEVELS.forEach(lvl => {
    const btn = document.createElement('button');
    btn.className = 'level-stamp' + (lvl === currentLevel ? ' active' : '');
    btn.textContent = lvl;
    btn.onclick = () => onSelect(lvl);
    container.appendChild(btn);
  });
}

// ---- Game state ----
let gameLevel = "A1";
let score = 0, streak = 0;
let currentSentence = "";
let currentWords = [];      // correct order
let placedIndices = [];     // indices (into scrambled array) placed so far
let scrambled = [];         // scrambled word list with unique ids
let usedThisLevel = new Set();

const answerLine = document.getElementById('answerLine');
const tray = document.getElementById('tray');
const feedback = document.getElementById('feedback');
const progressVal = document.getElementById('progressVal');
const scoreVal = document.getElementById('scoreVal');
const streakVal = document.getElementById('streakVal');

function refreshGameLevelRow(){
  buildLevelRow(document.getElementById('gameLevels'), gameLevel, (lvl) => {
    gameLevel = lvl;
    usedThisLevel.clear();
    refreshGameLevelRow();
    loadNewSentence();
  });
}

function pickSentence(){
  const pool = SENTENCES[gameLevel];
  let idx = Math.floor(Math.random() * pool.length);
  if (usedThisLevel.size < pool.length){
    let tries = 0;
    while (usedThisLevel.has(idx) && tries < 20){
      idx = Math.floor(Math.random() * pool.length);
      tries++;
    }
  } else {
    usedThisLevel.clear();
  }
  usedThisLevel.add(idx);
  return pool[idx];
}

function loadNewSentence(){
  feedback.textContent = '';
  feedback.className = 'feedback';
  hintLine.textContent = '';
  hintsUsed = 0;
  currentSentence = pickSentence();
  currentWords = currentSentence.replace(/\.$/,'').split(' ');
  // build scrambled tile list
  scrambled = currentWords.map((w, i) => ({ text: w, id: i, used: false }));
  shuffleUntilDifferent(scrambled, currentWords);
  placedIndices = [];
  progressVal.textContent = gameLevel + " sentence";
  renderTray();
  renderAnswer();
}

function shuffleUntilDifferent(arr, originalWords){
  let attempts = 0;
  do {
    for (let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    attempts++;
  } while (arr.map(t => t.text).join(' ') === originalWords.join(' ') && attempts < 10 && arr.length > 1);
}

function renderTray(){
  tray.innerHTML = '';
  scrambled.forEach(tile => {
    if (tile.used) return;
    const el = document.createElement('button');
    el.className = 'tile';
    el.textContent = tile.text;
    el.onclick = () => placeTile(tile.id);
    tray.appendChild(el);
  });
}

function renderAnswer(){
  answerLine.innerHTML = '';
  placedIndices.forEach(id => {
    const tile = scrambled.find(t => t.id === id);
    const el = document.createElement('button');
    el.className = 'tile placed';
    el.textContent = tile.text;
    el.onclick = () => removeTile(id);
    answerLine.appendChild(el);
  });
}

function placeTile(id){
  const tile = scrambled.find(t => t.id === id);
  tile.used = true;
  placedIndices.push(id);
  renderTray();
  renderAnswer();
}

function removeTile(id){
  const tile = scrambled.find(t => t.id === id);
  tile.used = false;
  placedIndices = placedIndices.filter(i => i !== id);
  renderTray();
  renderAnswer();
}

document.getElementById('checkBtn').onclick = () => {
  const built = placedIndices.map(id => scrambled.find(t => t.id === id).text).join(' ');
  const target = currentWords.join(' ');
  if (built.length === 0){
    feedback.textContent = "Place some words first!";
    feedback.className = 'feedback wrong';
    return;
  }
  if (built === target){
    score += 10;
    streak += 1;
    feedback.textContent = "Correct! Well done. ✓";
    feedback.className = 'feedback correct';
    scoreVal.textContent = score;
    streakVal.textContent = streak;
    setTimeout(loadNewSentence, 900);
  } else {
    streak = 0;
    streakVal.textContent = streak;
    feedback.textContent = "Not quite right — check the word order and try again.";
    feedback.className = 'feedback wrong';
  }
};

document.getElementById('clearBtn').onclick = () => {
  scrambled.forEach(t => t.used = false);
  placedIndices = [];
  renderTray();
  renderAnswer();
  feedback.textContent = '';
  hintLine.textContent = '';
};

const hintLine = document.getElementById('hintLine');
let hintsUsed = 0;

document.getElementById('hintBtn').onclick = () => {
  const nextCorrectWord = currentWords[placedIndices.length];
  if (!nextCorrectWord){
    hintLine.textContent = "Sentence already complete — press Check.";
    return;
  }
  hintsUsed += 1;
  const candidate = scrambled.find(t => !t.used && t.text === nextCorrectWord);
  if (candidate) placeTile(candidate.id);
  const remaining = currentWords.length - placedIndices.length;
  hintLine.textContent = remaining > 0
    ? `Hint ${hintsUsed}: word placed for you — ${remaining} word${remaining === 1 ? '' : 's'} left.`
    : `Hint ${hintsUsed}: last word placed — press Check.`;
};

document.getElementById('nextBtn').onclick = loadNewSentence;

// ---- Library ----
let libLevel = "A1";
const libList = document.getElementById('libList');

function refreshLibLevelRow(){
  buildLevelRow(document.getElementById('libLevels'), libLevel, (lvl) => {
    libLevel = lvl;
    refreshLibLevelRow();
    renderLibrary();
  });
}

function renderLibrary(){
  libList.innerHTML = '';
  const passages = PASSAGES[libLevel] || [];
  if (passages.length === 0){
    libList.innerHTML = '<p style="color:var(--ink-soft)">No passages yet at this level — add one in the DATA section.</p>';
    return;
  }
  passages.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'lib-card';
    const wordCount = p.text.trim().split(/\s+/).length;
    const readTime = Math.max(1, Math.round(wordCount / 130));
    card.innerHTML = `
      <div class="lib-head">
        <div>
          <h3>${p.title}</h3>
          <div class="lib-meta">${wordCount} words • ~${readTime} min read</div>
        </div>
        <span class="lib-badge">${libLevel}</span>
      </div>
      <div class="lib-preview">${p.text.slice(0,110)}…</div>
      <div class="lib-full">
        <p>${p.text}</p>
        <div class="lib-questions">
          <p>Think about it:</p>
          <ol>${p.questions.map(q => `<li>${q}</li>`).join('')}</ol>
        </div>
      </div>
    `;
    card.onclick = (e) => card.classList.toggle('open');
    libList.appendChild(card);
  });
}

// ---- init ----
refreshGameLevelRow();
refreshLibLevelRow();
loadNewSentence();
renderLibrary();
</script>
